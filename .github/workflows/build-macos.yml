name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-intel
            runner: macos-15-intel
            artifact: ExcelArchiveSearch-mac-intel.zip

          - name: mac-arm64
            runner: macos-latest
            artifact: ExcelArchiveSearch-mac-arm64.zip

          - name: windows-x64
            runner: windows-latest
            artifact: ExcelArchiveSearch-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name ExcelArchiveSearch excel_archive_app.py

      - name: Verify macOS app
        if: runner.os == 'macOS'
        run: |
          file dist/ExcelArchiveSearch.app/Contents/MacOS/ExcelArchiveSearch
          codesign --verify --deep --strict --verbose=2 dist/ExcelArchiveSearch.app

      - name: Verify Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path dist/ExcelArchiveSearch/ExcelArchiveSearch.exe)) {
            throw "ExcelArchiveSearch.exe was not created"
          }

      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/ExcelArchiveSearch.app ${{ matrix.artifact }}

      - name: Zip Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ExcelArchiveSearch -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
